services:

  app:
    build:
      context: ./laravel-api
      dockerfile: my-app/Dockerfile
    container_name: digital-library-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/my-app/vendor
      - /var/www/html/my-app/node_modules

    depends_on:
      - pg-user
      - pg-book
      - pg-activity
      - redis
      - mongodb
    networks:
      - library-net

  nginx-app:
    image: nginx:1.27-alpine
    container_name: nginx-app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./config/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - library-net

  nginx-db:
    image: nginx:1.27-alpine
    container_name: nginx-db
    ports:
      - "15432:15432"
      - "15433:15433"
      - "15434:15434"
      - "16379:16379"
      - "17017:17017"

    volumes:
      - ./config/nginx/db.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - pg-user
      - pg-book
      - pg-activity
      - redis
      - mongodb

    networks:
      - library-net

  pg-user:
    image: postgres:16
    container_name: pg-user
    environment:
      POSTGRES_DB: db_user
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_user_data:/var/lib/postgresql/data

    networks:
      - library-net

  pg-book:
    image: postgres:16
    container_name: pg-book

    environment:
      POSTGRES_DB: db_book
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret

    volumes:
      - pg_book_data:/var/lib/postgresql/data

    networks:
      - library-net

  pg-activity:
    image: postgres:16
    container_name: pg-activity
    environment:
      POSTGRES_DB: db_activity
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret

    volumes:
      - pg_activity_data:/var/lib/postgresql/data

    networks:
      - library-net

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data

    networks:
      - library-net

  mongodb:
    image: mongo:7
    container_name: mongodb

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret

    volumes:
      - mongo_data:/data/db

    networks:
      - library-net

networks:
  library-net:
    driver: bridge

volumes:
  pg_user_data:
  pg_book_data:
  pg_activity_data:
  redis_data:
  mongo_data:
